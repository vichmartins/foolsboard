# OPTIONAL reverse proxy for foolsboard (plain example -- adapt to your setup).
#
# foolsboard already serves the SPA + API + WebSocket + media on port 9534 by
# itself, so this is only needed if you want TLS, a hostname, central logging,
# etc. Point proxy_pass at wherever the app listens:
#   - nginx on the SAME host as the app -> set FOOLSBOARD_HOST=127.0.0.1, use 127.0.0.1:9534
#   - nginx on a DIFFERENT host         -> keep FOOLSBOARD_HOST=0.0.0.0, use <app-ip>:9534
#
# This block assumes your http{} already defines `map $http_upgrade
# $connection_upgrade` plus the proxy_set_header globals. It sets NO
# proxy_set_header so it INHERITS them (including the WebSocket Upgrade/Connection
# headers). Do NOT add a single proxy_set_header here unless you re-declare ALL
# of them -- nginx drops the inherited set when any one is set in a child block.

server {
    listen 80;
    listen [::]:80;
    server_name foolsboard.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name foolsboard.example.com;

    # Omit if your http{} block sets a host-wide cert; otherwise point these at
    # your certificate service:
    # ssl_certificate     /etc/letsencrypt/live/foolsboard.example.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/foolsboard.example.com/privkey.pem;

    access_log /var/log/nginx/foolsboard.access.log;
    error_log  /var/log/nginx/foolsboard.error.log warn;

    client_max_body_size 1024m;          # large media / .zip imports

    location / {
        proxy_pass http://127.0.0.1:9534;   # or http://<app-ip>:9534 if nginx is remote
        proxy_read_timeout 3600s;           # keep long-lived WebSockets alive
    }
}
